<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="shortcut icon" href="js.png" type="image/x-icon">
    <title>CRUD</title>
</head>

<body>

    <div class="w-75 pt-4 mx-auto">

        <label for="ProductName">ProductName : </label>
        <input type="text" class="form-control my-2" id="ProductName">

        <label for="ProductCount">ProductCount : </label>
        <input type="number" class="form-control my-2" id="ProductCount">

        <label for="ProductPrice">ProductPrice : </label>
        <input type="text" class="form-control my-2" id="ProductPrice">

        <label for="ProductCategory">ProductCategory : </label>
        <input type="text" class="form-control my-2" id="ProductCategory">

        <label for="ProductDiscription">ProductDiscription : </label>
        <textarea type="text" class="form-control my-2" id="ProductDiscription"></textarea>

        <button id="buttonAdd" class="btn btn-info">Add Product</button>

    </div>


    <div class="w-75 py-4 mx-auto">
        <div class="w-75 mx-auto py-4">
            <label for="searchInput">search...</label>
            <input type="text" class="form-control" id="searchInput">
        </div>

        <table class="table" style="text-align: center;">
            <thead>
                <th>Index</th>
                <th>ProductName</th>
                <th>ProductCount</th>
                <th>ProductPrice</th>
                <th>ProductCategory</th>
                <th>ProductDiscription</th>
                <th>Increase</th>
                <th>Decrease</th>
                <th>update</th>
                <th>detele</th>
            </thead>
            <tbody id="tableRow">
            </tbody>
        </table>
    </div>



    <script src="main.js"></script>
</body>

</html>
